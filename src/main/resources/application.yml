spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/focusboard
    username: ${POSTGRES_USER:focusboard_user}
    password: ${POSTGRES_PASSWORD:focusboard_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

security:
  jwt:
    secret: "81COWawCOA88uMxO-IerHQrmfk_xJkHU9VRsbbaw3fs"
    refresh-token-expiration-days: 7

logging:
  level:
    com.taskflow: DEBUG
    org.hibernate.SQL: DEBUG
