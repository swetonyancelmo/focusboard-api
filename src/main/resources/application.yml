spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/focusboard}
    username: ${POSTGRES_USER:focusboard_user}
    password: ${POSTGRES_PASSWORD:focusboard_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:81COWawCOA88uMxO-IerHQrmfk_xJkHU9VRsbbaw3fs}
    refresh-token-expiration-days: 7

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.taskflow: DEBUG
    org.hibernate.SQL: DEBUG
